name: Generate snake animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 18 * * *"

  # allows to manually run the job at any time
  workflow_dispatch:

  # run on every push on the master branch,
  # except when the push only contains assets generated by the other workflows
  push:
    branches:
      - master
    paths-ignore:
      - "profile-3d-contrib/**"
      - "github-metrics.svg"

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # generate the snake animation from the contribution graph
      - name: generate github-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # push the generated svg to the `output` branch,
      # available at https://raw.githubusercontent.com/pignuante/pignuante/output/<file>
      - name: push to the output branch
        uses: crazy-max/ghaction-github-pages@v5.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
